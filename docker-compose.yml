version: '3.8'

services:
  postgres:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
    ports:
      - 5435:5432
    restart: on-failure:3
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - quotelab-network

  redis:
    container_name: redis
    image: redis:7-alpine
    command: redis-server
    volumes:
      - redis-data:/data
    networks:
      - quotelab-network
    ports:
      - 6379:6379

volumes:
  postgres-data:
  redis-data:

networks:
  quotelab-network:
    driver: bridge
    